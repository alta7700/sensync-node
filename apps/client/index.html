<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensync2</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --border: #2f3945;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --ok: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body { background: radial-gradient(circle at top, #152238 0%, var(--bg) 55%); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; }
      button { font: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
