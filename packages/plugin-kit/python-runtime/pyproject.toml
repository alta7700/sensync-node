[project]
name = "sensync2-plugin-kit-python-runtime"
version = "0.1.0"
description = "Shared Python runtime for sensync2 IPC compute workers"
requires-python = ">=3.13,<3.14"
dependencies = [
    "numpy>=2.3.5,<3.0.0",
    "scipy>=1.16.3,<2.0.0",
    "protobuf>=6.33.3,<7.0.0",
]

[dependency-groups]
dev = [
    "grpcio-tools>=1.76.0,<2.0.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sensync2_plugin_kit"]
